<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <style>
    body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; }
    .container { max-width: 800px; margin: 40px auto; background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .header { background-color: #1a365d; padding: 40px; text-align: center; }
    .header h1 { color: #ffffff; margin: 0; font-size: 28px; }
    .body { padding: 40px; color: #333333; }
    .body h2 { color: #1a365d; font-size: 24px; }
    .body p { font-size: 16px; line-height: 1.6; }
    .button { display: inline-block; margin-top: 20px; padding: 14px 28px; background-color: #1a365d; color: #ffffff; text-decoration: none; border-radius: 6px; font-size: 16px; }
    .footer { background-color: #f4f4f4; text-align: center; padding: 20px; font-size: 14px; color: #999999; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>HomeLink Password Reset</h1>
  </div>
  <div class="body">
    <h2>Hello, <span th:text="${name}"></span>!</h2>
    <p>We received a request to reset your password. Click the button below to choose a new one.</p>
    <p>This link will expire in <strong>1 hour</strong>.</p>
<!--    <a th:href="${resetLink}" class="button">Reset My Password</a>-->

    <!--    Only for development until the point when the backend will be deployed-->
    <!--    to the domain after that the link with the proper url will work -->
    <span th:text="${resetLink}"></span>

    <p style="margin-top: 30px;">If you didn't request this, you can safely ignore this email.</p>

    <p>Best regards,<br/><strong>The HomeLink Team</strong></p>
  </div>
  <div class="footer">
    <p>© 2026 HomeLink. All rights reserved.</p>
  </div>
</div>
</body>
</html>
